<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="دوائي">
<meta name="theme-color" content="#059669">
<title>منظومة دوائي - لوحة الطبيب</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { cairo: ['Cairo', 'sans-serif'] },
      colors: {
        emerald: {
          950: '#022c22', 900: '#064e3b', 800: '#065f46',
          700: '#047857', 600: '#059669', 500: '#10b981',
          400: '#34d399', 300: '#6ee7b7', 200: '#a7f3d0',
        }
      }
    }
  }
}
</script>
<style>
  * { font-family: 'Cairo', sans-serif; }
  html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(52,211,153,.3); border-radius: 4px; }
  @media (orientation: portrait) { #rotate-warn { display: flex !important; } #root { display: none !important; } }
  @media (orientation: landscape) { #rotate-warn { display: none !important; } }
  .glow { text-shadow: 0 0 12px currentColor; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn .25s ease forwards; }
</style>
</head>
<body>

<!-- تحذير الوضع العمودي -->
<div id="rotate-warn" style="display:none;position:fixed;inset:0;background:#020a06;z-index:9999999;
  flex-direction:column;align-items:center;justify-content:center;gap:18px;color:#fff;text-align:center;padding:30px;">
  <div style="font-size:60px;animation:spin 1.4s ease-in-out infinite alternate;">🔄</div>
  <h2 style="font-size:22px;font-weight:900;color:#34d399;">يرجى تدوير الجهاز أفقياً</h2>
  <p style="font-size:13px;color:#6b7280;">لوحة الطبيب تعمل بالوضع الأفقي فقط</p>
</div>
<style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(90deg)}}</style>

<div id="root"></div>

<script>
window.onerror = function(msg, url, line, col, error) {
  document.getElementById("root").innerHTML =
    '<div style="background:#7f1d1d;color:#fff;padding:20px;margin:20px;border-radius:10px;font-family:monospace;font-size:14px;white-space:pre-wrap;direction:ltr;">' +
    '🚨 خطأ:\n' + msg + '\nسطر: ' + line + ' عمود: ' + col +
    '</div>';
  document.getElementById("root").style.display = "block";
  var rw = document.getElementById("rw");
  if (rw) rw.style.display = "none";
  return false;
};
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ===== بيانات افتراضية =====
const DEF_MEDS = [
  { id:1, name:"Amoxicillin 500mg - 1x3", cat:"مضاد حيوي", emoji:"💊", img:"" },
  { id:2, name:"Paracetamol 500mg - 1x2", cat:"مسكن ألم",  emoji:"💊", img:"" },
  { id:3, name:"Zofran Amp",               cat:"مضاد غثيان",emoji:"💉", img:"" },
];
const DEF_LABS = [
  { id:1, label:"CBC صورة الدم الكاملة",  checked:false },
  { id:2, label:"Urea / Creatinine",        checked:false },
  { id:3, label:"HbA1c السكر التراكمي",    checked:false },
];
const DEF_RADS = [
  { id:1, label:"Chest X-Ray",             checked:false },
  { id:2, label:"Abdominal Sonar",          checked:false },
];
const DEF_SETTINGS = {
  clinicName:"العيادة الاستشارية التخصصية",
  doctorName:"د. مصطفى أحمد",
  stampLine1:"د. مصطفى أحمد",
  stampLine2:"العيادة الاستشارية",
  stampShape:"classic",
};
const EMOJIS = ["💊","💉","🩺","🧬","🩹","🌡️","⚕️","🫀","🫁","🧪","🩻","🔬","🍃","🌿","💪","🏥","🧴","🫙"];

// ===== الختم =====
function StampEl({ l1, l2, shape }) {
  if (shape === "classic") return (
    <div style={{ transform:"rotate(-5deg)", border:"3px solid #124e78", color:"#124e78",
      borderRadius:"50%", width:80, height:80, display:"flex", flexDirection:"column",
      alignItems:"center", justifyContent:"center", textAlign:"center",
      padding:5, lineHeight:1.4, fontSize:8, fontWeight:700 }}>
      {l1}
      <span style={{ fontSize:7, fontWeight:400, marginTop:2 }}>{l2}</span>
      <span style={{ fontSize:6, opacity:.6 }}>مصدق إلكترونياً</span>
    </div>
  );
  return (
    <div style={{ transform:"rotate(2deg)", border:"2px dashed #c62828", color:"#c62828",
      padding:"6px 12px", borderRadius:4, display:"inline-flex", flexDirection:"column",
      alignItems:"center", lineHeight:1.4, fontSize:10, fontWeight:700 }}>
      {l1}
      <span style={{ fontSize:8, fontWeight:400, marginTop:1 }}>{l2}</span>
      <span style={{ fontSize:7, opacity:.6 }}>مصدق إلكترونياً</span>
    </div>
  );
}

// ===== صف فحص =====
function CheckRow({ item, dark, onToggle, onDelete }) {
  return (
    <div className={`flex items-center gap-2 px-2 py-1.5 rounded-lg group transition-all cursor-pointer
      ${dark ? "hover:bg-emerald-950/40" : "hover:bg-emerald-50"}`}>
      <input type="checkbox" checked={item.checked} onChange={onToggle}
        className="w-3.5 h-3.5 flex-shrink-0 cursor-pointer" style={{ accentColor:"#10b981" }} />
      <span className="flex-1 text-[11px]">{item.label}</span>
      <button onClick={onDelete}
        className="w-5 h-5 rounded flex items-center justify-center text-[9px]
          opacity-0 group-hover:opacity-100 transition-all
          hover:bg-red-500/15 hover:text-red-400 text-slate-500">✕</button>
    </div>
  );
}

// ===== البطاقة =====
function Card({ children, dark, style={}, className="" }) {
  return (
    <div className={`rounded-2xl border transition-all duration-300 relative overflow-hidden ${className}`}
      style={{
        background: dark ? "#131B2E" : "#ffffff",
        borderColor: dark ? "#1E293B" : "#f1f5f9",
        boxShadow: dark ? "0 8px 32px rgba(0,0,0,.45),0 1px 0 rgba(52,211,153,.06) inset"
                        : "0 4px 16px rgba(0,0,0,.06)",
        backdropFilter: dark ? "blur(4px)" : "none",
        ...style
      }}>
      {dark && <div style={{ position:"absolute", top:0, left:0, right:0, height:1,
        background:"linear-gradient(90deg,transparent,rgba(52,211,153,.2),transparent)" }} />}
      {children}
    </div>
  );
}

// ===== AddRow مساعد =====
function AddRow({ dark, placeholder, accentColor, onAdd }) {
  const [val, setVal] = useState("");
  function submit() { if(val.trim()) { onAdd(val.trim()); setVal(""); } }
  return (
    <div className="flex gap-1.5 mt-2">
      <input value={val} onChange={e => setVal(e.target.value)}
        placeholder={placeholder}
        onKeyDown={e => e.key === "Enter" && submit()}
        style={{
          flex:1, height:28, padding:"0 10px", borderRadius:8, fontSize:10,
          border:`1px solid ${dark ? "rgba(52,211,153,.2)" : "#e2e8f0"}`,
          background: dark ? "rgba(52,211,153,.04)" : "#f8fafc",
          color: dark ? "#f0fdf4" : "#1e293b", outline:"none"
        }} />
      <button onClick={submit}
        style={{
          width:28, height:28, borderRadius:8, border:`1px solid ${accentColor}44`,
          background:`${accentColor}15`, color:accentColor,
          fontSize:16, cursor:"pointer", display:"flex",
          alignItems:"center", justifyContent:"center", fontWeight:700
        }}>+</button>
    </div>
  );
}

// ===== التطبيق الرئيسي =====
function DoctorApp() {
  const [dark, setDark]         = useState(() => localStorage.getItem("dwaee_th") !== "light");
  const [settings, setSett]     = useState(() => JSON.parse(localStorage.getItem("dwaee_sett")||"null") || DEF_SETTINGS);
  const [settDraft, setSD]      = useState(DEF_SETTINGS);
  const [meds, setMeds]         = useState(() => JSON.parse(localStorage.getItem("dwaee_meds")||"null") || DEF_MEDS);
  const [labs, setLabs]         = useState(DEF_LABS);
  const [rads, setRads]         = useState(DEF_RADS);
  const [patients]              = useState([
    { id:"p1", name:"ليان محمد",      type:"normal", time:"09:10" },
    { id:"p2", name:"محمد مرتضى",     type:"urgent", time:"09:35" },
    { id:"p3", name:"شمس سجاد محمد",  type:"review", time:"10:00" },
  ]);
  const [activeP, setActiveP]   = useState(null);
  const [diag, setDiag]         = useState("");
  const [rx, setRx]             = useState("");
  const [stampOn, setStampOn]   = useState(false);
  const [showMeds, setShowMeds] = useState(false);
  const [showSett, setShowSett] = useState(false);
  const [showEmoji, setShowEmoji]= useState(false);
  const [emojiTgt, setEmojiTgt] = useState("new");
  const [newName, setNewName]   = useState("");
  const [newCat, setNewCat]     = useState("");
  const [newEmoji, setNewEmoji] = useState("💊");
  const [newImg, setNewImg]     = useState("");
  const [doneCount, setDone]    = useState(0);
  const [toast, setToast]       = useState(null);
  const fileRef                 = useRef();

  // ثيم
  useEffect(() => { localStorage.setItem("dwaee_th", dark ? "dark" : "light"); }, [dark]);
  useEffect(() => { localStorage.setItem("dwaee_meds", JSON.stringify(meds)); }, [meds]);

  function showToast(msg, ok=false) {
    setToast({ msg, ok });
    setTimeout(() => setToast(null), 3000);
  }

  //ألوان ديناميكية
  const C = {
    bg:    dark ? "#0B1221" : "#F8FAFC",
    card:  dark ? "#131B2E" : "#ffffff",
    bar:   dark ? "#0d1729" : "#ffffff",
    bor:   dark ? "#1E293B" : "#f1f5f9",
    txt:   dark ? "#f0fdf4" : "#1e293b",
    mut:   dark ? "#6b7280" : "#94a3b8",
    inp:   dark ? { background:"rgba(52,211,153,.05)", borderColor:"rgba(52,211,153,.2)", color:"#f0fdf4" }
                : { background:"#f8fafc", borderColor:"#e2e8f0", color:"#1e293b" },
    pitem: dark ? { background:"#0f1a2e", borderColor:"#1E293B" }
                : { background:"#f8fafc", borderColor:"#f1f5f9" },
  };

  function typeColor(t) { return t==="urgent"?"#f87171":t==="review"?"#38bdf8":"#34d399"; }
  function typeLabel(t) { return t==="urgent"?"طارئة":t==="review"?"مراجعة":"كشف"; }

  // إرسال الروشتة
  async function sendRx() {
    if (!activeP)    { showToast("🚨 اختر مريضاً أولاً!"); return; }
    if (!rx.trim())  { showToast("🚨 الروشتة فارغة!"); return; }
    setDone(d => d + 1);
    showToast("✅ تم الإرسال للصيدلية!", true);
  }

  // طباعة الوصفة
  function printRx() {
    if (!rx.trim()) { showToast("🚨 الروشتة فارغة!"); return; }
    const stampHTML = stampOn
      ? `<div style="border:3px solid #124e78;color:#124e78;border-radius:50%;
          width:80px;height:80px;display:flex;flex-direction:column;align-items:center;
          justify-content:center;font-size:8px;font-weight:700;text-align:center;
          transform:rotate(-5deg);padding:5px;">
          ${settings.stampLine1}
          <span style="font-size:7px;font-weight:400;">${settings.stampLine2}</span>
          <span style="font-size:6px;opacity:.6">مصدق إلكترونياً</span>
        </div>` : "";
    const pw = window.open("","_blank");
    pw.document.write(`<!DOCTYPE html><html><head><title>روشتة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>*{font-family:'Cairo';}body{direction:rtl;padding:18mm;color:#000;display:flex;flex-direction:column;min-height:90vh;}
    h2{color:#059669;border-bottom:2px solid #059669;padding-bottom:8px;margin-bottom:14px;}
    .rx{font-family:monospace;background:#f0fdf4;padding:14px;border:1px dashed #059669;
      white-space:pre-line;border-radius:8px;min-height:120px;}
    .foot{margin-top:auto;display:flex;justify-content:flex-end;padding-top:20px;}
    @page{size:A5;margin:12mm;}</style></head><body>
    <h2>${settings.clinicName}</h2>
    <p><b>الطبيب:</b> ${settings.doctorName}</p>
    <p><b>المريض:</b> ${activeP?.name||"—"}</p>
    <p><b>التشخيص:</b> ${diag||"مستقر"}</p>
    <p style="margin-top:12px;"><b>Rx — العلاجات:</b></p>
    <div class="rx">${rx}</div>
    <div class="foot">${stampHTML}</div>
    </body></html>`);
    pw.document.close();
    setTimeout(() => pw.print(), 400);
  }

  // طباعة التقرير
  function printReport() {
    const rows = [
      ...labs.map(l => `<tr><td>${l.label}</td><td>${l.checked?"✅":"—"}</td></tr>`),
      ...rads.map(r => `<tr><td>${r.label}</td><td>${r.checked?"✅":"—"}</td></tr>`),
    ].join("");
    const pw = window.open("","_blank");
    pw.document.write(`<!DOCTYPE html><html><head><title>تقرير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>*{font-family:'Cairo';}body{direction:rtl;padding:18mm;color:#000;}
    h2{color:#059669;border-bottom:3px solid #059669;padding-bottom:8px;}
    table{width:100%;border-collapse:collapse;margin-top:12px;}
    th,td{border:1px solid #d1fae5;padding:8px;text-align:right;font-size:12px;}
    th{background:#f0fdf4;color:#065f46;font-weight:700;}
    .rx{background:#f0fdf4;padding:12px;border:1px solid #a7f3d0;white-space:pre-line;border-radius:8px;}
    @page{size:A4;margin:18mm;}</style></head><body>
    <h2>${settings.clinicName} — تقرير طبي</h2>
    <p><b>المريض:</b> ${activeP?.name||"—"} &nbsp; <b>التاريخ:</b> ${new Date().toLocaleDateString("ar-IQ")}</p>
    <p><b>التشخيص:</b> ${diag||"—"}</p>
    <table><tr><th>الفحص/الإجراء</th><th>الحالة</th></tr>${rows}</table>
    <div style="margin-top:16px;"><p><b>الخطة العلاجية:</b></p>
    <div class="rx">${rx||"—"}</div></div>
    </body></html>`);
    pw.document.close();
    setTimeout(() => pw.print(), 400);
  }

  // حفظ الإعدادات
  function saveSettings() {
    setSett(settDraft);
    localStorage.setItem("dwaee_sett", JSON.stringify(settDraft));
    setShowSett(false);
    showToast("✅ تم حفظ الإعدادات", true);
  }

  // إضافة دواء
  function addMed() {
    if (!newName.trim()) { showToast("🚨 أدخل اسم العلاج!"); return; }
    setMeds(m => [...m, { id:Date.now(), name:newName, cat:newCat, emoji:newEmoji, img:newImg }]);
    setNewName(""); setNewCat(""); setNewEmoji("💊"); setNewImg("");
    if(fileRef.current) fileRef.current.value = "";
    showToast("✅ تم إضافة العلاج", true);
  }

  function handleImg(e) {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = ev => setNewImg(ev.target.result);
    r.readAsDataURL(f);
  }

  function pickEmoji(t) { setEmojiTgt(t); setShowEmoji(true); }
  function selectEmoji(e) {
    if (emojiTgt === "new") setNewEmoji(e);
    else setMeds(m => m.map((x,i) => i===emojiTgt ? {...x, emoji:e, img:""} : x));
    setShowEmoji(false);
  }

  // ===== الواجهة =====
  return (
    <div style={{ background:C.bg, color:C.txt, width:"100vw", height:"100vh",
      display:"flex", flexDirection:"column", overflow:"hidden", transition:"all .3s" }}>

      {/* ===== هيدر ===== */}
      <header style={{
        background: dark
          ? "linear-gradient(135deg,#0d1729,#091528)"
          : "#ffffff",
        borderBottom:`1px solid ${C.bor}`,
        height:56, flexShrink:0,
        display:"flex", alignItems:"center",
        justifyContent:"space-between",
        padding:"0 14px", gap:10, zIndex:50,
        boxShadow: dark ? "0 2px 20px rgba(0,0,0,.4)" : "0 1px 8px rgba(0,0,0,.06)",
        position:"relative"
      }}>
        {/* خط توهج أسفل الهيدر */}
        {dark && <div style={{ position:"absolute", bottom:0, left:0, right:0, height:1,
          background:"linear-gradient(90deg,transparent,rgba(52,211,153,.3),transparent)" }} />}

        {/* لوغو */}
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{
            width:38, height:38, borderRadius:11,
            background:"linear-gradient(135deg,#059669,#34d399)",
            display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:18, flexShrink:0,
            boxShadow:"0 4px 14px rgba(52,211,153,.4)"
          }}>🏥</div>
          <div>
            <div style={{ fontSize:13, fontWeight:700, lineHeight:1.3 }}>{settings.clinicName}</div>
            <div style={{ fontSize:9, color:C.mut, lineHeight:1.3 }}>{settings.doctorName}</div>
          </div>
        </div>

        {/* أدوات */}
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>

          {/* زر الختم */}
          <button onClick={() => setStampOn(s => !s)} style={{
            padding:"6px 13px", borderRadius:10, border:"none", cursor:"pointer",
            fontSize:11, fontWeight:700, display:"flex", alignItems:"center", gap:6,
            transition:"all .2s",
            background: stampOn ? "rgba(56,189,248,.15)" : dark ? "rgba(255,255,255,.05)" : "#f1f5f9",
            color: stampOn ? "#38bdf8" : C.mut,
            border: `1px solid ${stampOn ? "rgba(56,189,248,.4)" : C.bor}`,
            boxShadow: stampOn ? "0 0 10px rgba(56,189,248,.2)" : "none"
          }}>🔏 {stampOn ? "إزالة الختم" : "تطبيق الختم"}</button>

          {/* الإعدادات */}
          <div style={{ position:"relative" }}>
            <button onClick={() => { setShowSett(s => !s); setSD({...settings}); }}
              style={{
                width:36, height:36, borderRadius:10,
                background: dark ? "rgba(255,255,255,.05)" : "#f1f5f9",
                border:`1px solid ${C.bor}`, color:C.mut,
                cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:15, transition:"all .2s"
              }}>⚙️</button>

            {showSett && (
              <div className="fade-in" style={{
                position:"absolute", top:42, left:0, width:280,
                background: dark ? "#131B2E" : "#ffffff",
                border:`1px solid ${C.bor}`,
                borderRadius:16, padding:16, zIndex:600,
                boxShadow: dark ? "0 16px 48px rgba(0,0,0,.6)" : "0 8px 32px rgba(0,0,0,.12)"
              }} onClick={e => e.stopPropagation()}>
                <p style={{ fontSize:12, fontWeight:700, color:"#10b981", marginBottom:12 }}>
                  ⚙️ إعدادات الواجهة والختم
                </p>
                {[["اسم العيادة","clinicName"],["اسم الطبيب","doctorName"],
                  ["السطر الأول في الختم","stampLine1"],["السطر الثاني في الختم","stampLine2"]]
                  .map(([lbl,key]) => (
                  <div key={key} style={{ marginBottom:8 }}>
                    <label style={{ fontSize:10, fontWeight:700, color:C.mut, display:"block", marginBottom:3 }}>{lbl}</label>
                    <input value={settDraft[key]} onChange={e => setSD(s => ({...s,[key]:e.target.value}))}
                      style={{ width:"100%", padding:"7px 10px", borderRadius:8, fontSize:11,
                        border:`1px solid ${dark?"rgba(52,211,153,.2)":"#e2e8f0"}`,
                        background:dark?"rgba(52,211,153,.05)":"#f8fafc",
                        color:C.txt, outline:"none" }} />
                  </div>
                ))}
                <label style={{ fontSize:10, fontWeight:700, color:C.mut, display:"block", marginBottom:6 }}>شكل الختم</label>
                <div style={{ display:"flex", gap:8, marginBottom:10 }}>
                  {["classic","modern"].map(s => (
                    <button key={s} onClick={() => setSD(d => ({...d,stampShape:s}))}
                      style={{
                        flex:1, padding:"7px 0", borderRadius:8, fontSize:10, fontWeight:700, cursor:"pointer",
                        border:`1px solid ${settDraft.stampShape===s?"#10b981":C.bor}`,
                        background: settDraft.stampShape===s ? "rgba(16,185,129,.12)" : dark?"rgba(255,255,255,.04)":"#f8fafc",
                        color: settDraft.stampShape===s ? "#10b981" : C.mut
                      }}>
                      {s==="classic"?"🔵 دائري":"🔴 مستطيل"}
                    </button>
                  ))}
                </div>
                {/* معاينة */}
                <div style={{ background:"#fff", borderRadius:8, padding:12,
                  display:"flex", justifyContent:"center", marginBottom:10 }}>
                  <StampEl l1={settDraft.stampLine1} l2={settDraft.stampLine2} shape={settDraft.stampShape} />
                </div>
                <button onClick={saveSettings} style={{
                  width:"100%", padding:"9px 0", borderRadius:10,
                  background:"linear-gradient(to right,#059669,#34d399)",
                  color:"#fff", border:"none", fontWeight:700, fontSize:12, cursor:"pointer",
                  boxShadow:"0 4px 12px rgba(52,211,153,.35)", transition:"all .2s"
                }}>💾 حفظ الإعدادات</button>
              </div>
            )}
          </div>

          {/* مفتاح الثيم */}
          <div style={{
            display:"flex", alignItems:"center", gap:8, padding:"5px 12px",
            borderRadius:12, border:`1px solid ${C.bor}`,
            background: dark ? "rgba(255,255,255,.04)" : "#f8fafc"
          }}>
            <span style={{ fontSize:13 }}>{dark?"🌙":"☀️"}</span>
            <div onClick={() => setDark(d => !d)} style={{
              position:"relative", width:42, height:22, borderRadius:20, cursor:"pointer",
              background: dark ? "#059669" : "#cbd5e1", transition:"all .3s"
            }}>
              <div style={{
                position:"absolute", top:3,
                left: dark ? 22 : 2,
                width:16, height:16, borderRadius:"50%",
                background:"#fff", transition:"all .3s",
                boxShadow:"0 2px 6px rgba(0,0,0,.2)"
              }} />
            </div>
            <span style={{ fontSize:13 }}>{dark?"☀️":"🌙"}</span>
          </div>
        </div>
      </header>

      {/* ===== الجسم ===== */}
      <div style={{
        display:"grid", gridTemplateColumns:"190px 1fr 218px",
        gap:10, padding:10,
        height:"calc(100vh - 56px)", overflow:"hidden"
      }}>

        {/* ===== عمود الطابور ===== */}
        <Card dark={dark} style={{ display:"flex", flexDirection:"column", padding:12, overflow:"hidden", gap:8 }}>
          <p style={{ fontSize:11, fontWeight:700, color:"#10b981", flexShrink:0,
            display:"flex", alignItems:"center", gap:6 }}>📅 طابور الحجز اليومي</p>

          {/* إحصاء */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7, flexShrink:0 }}>
            {[["انتظار", patients.length - doneCount, "#34d399"],
              ["معاينة", doneCount, "#38bdf8"]].map(([lbl, num, clr]) => (
              <div key={lbl} style={{
                background: dark?"#0f1a2e":"#f8fafc",
                border:`1px solid ${dark?"#1E293B":"#f1f5f9"}`,
                borderRadius:12, padding:8, textAlign:"center"
              }}>
                <div style={{
                  fontSize:22, fontWeight:900, color:clr,
                  ...(dark ? { textShadow:`0 0 12px ${clr}` } : {})
                }}>{num}</div>
                <div style={{ fontSize:8, color:C.mut, marginTop:2 }}>{lbl}</div>
              </div>
            ))}
          </div>

          {/* قائمة المرضى */}
          <div style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column", gap:5 }}>
            {patients.map(p => (
              <div key={p.id} onClick={() => { setActiveP(p); setDiag(""); setRx(""); setStampOn(false); }}
                style={{
                  ...C.pitem,
                  border:`1px solid ${activeP?.id===p.id ? "#10b981" : C.pitem.borderColor}`,
                  background: activeP?.id===p.id
                    ? dark ? "rgba(5,150,105,.15)" : "rgba(5,150,105,.08)"
                    : C.pitem.background,
                  borderRight:`3px solid ${activeP?.id===p.id ? "#10b981" : "transparent"}`,
                  borderRadius:10, padding:"8px 10px", cursor:"pointer", transition:"all .2s",
                  boxShadow: activeP?.id===p.id && dark ? "0 0 8px rgba(16,185,129,.15)" : "none"
                }}>
                <div style={{ fontSize:11, fontWeight:700 }}>{p.name}</div>
                <div style={{ display:"flex", justifyContent:"space-between", marginTop:2 }}>
                  <span style={{ fontSize:9, color:C.mut }}>{p.time}</span>
                  <span style={{ fontSize:9, fontWeight:700, color:typeColor(p.type) }}>{typeLabel(p.type)}</span>
                </div>
              </div>
            ))}
          </div>
        </Card>

        {/* ===== العمود الأوسط ===== */}
        <div style={{ display:"flex", flexDirection:"column", gap:10, overflow:"hidden" }}>

          {/* تشخيص */}
          <Card dark={dark} style={{ padding:12, flexShrink:0 }}>
            <p style={{ fontSize:11, fontWeight:700, color:"#10b981", marginBottom:8 }}>🩺 {settings.clinicName}</p>
            <p style={{ fontSize:10, color:C.mut, marginBottom:8 }}>
              المريض: <span style={{ color:"#10b981", fontWeight:700, fontSize:12 }}>
                {activeP?.name || "لم يُختر بعد"}
              </span>
            </p>
            <textarea value={diag} onChange={e => setDiag(e.target.value)}
              rows={2} placeholder="التشخيص والملاحظات السريرية..."
              style={{ width:"100%", padding:"8px 10px", borderRadius:10, fontSize:12,
                border:`1px solid ${dark?"rgba(52,211,153,.2)":"#e2e8f0"}`,
                background:dark?"rgba(52,211,153,.04)":"#f8fafc",
                color:C.txt, outline:"none", resize:"none",
                transition:"border-color .2s" }} />
          </Card>

          {/* روشتة */}
          <Card dark={dark} style={{ flex:1, display:"flex", flexDirection:"column", padding:12, overflow:"hidden", gap:8 }}>
            <p style={{ fontSize:11, fontWeight:700, color:"#10b981", flexShrink:0 }}>💊 الروشتة الإلكترونية</p>

            {/* زر Glassmorphism */}
            <button onClick={() => setShowMeds(true)} style={{
              width:"100%", padding:"10px 16px", borderRadius:12, fontSize:12, fontWeight:700,
              display:"flex", alignItems:"center", justifyContent:"center", gap:8,
              cursor:"pointer", flexShrink:0, transition:"all .2s",
              border:`1px solid rgba(52,211,153,.3)`,
              background:"linear-gradient(135deg,rgba(52,211,153,.1),rgba(5,150,105,.06))",
              color:"#34d399",
              boxShadow:"0 4px 16px rgba(52,211,153,.1),0 1px 0 rgba(255,255,255,.04) inset"
            }}>
              <span style={{ fontSize:16 }}>💊</span>
              قائمة العلاجات الموصى بها
              <span style={{
                fontSize:9, padding:"2px 8px", borderRadius:10,
                background:"rgba(52,211,153,.15)", border:"1px solid rgba(52,211,153,.3)"
              }}>{meds.length} علاج</span>
            </button>

            {/* حقل الروشتة */}
            <div style={{
              flex:1, display:"flex", flexDirection:"column",
              borderRadius:10, border:`1px solid ${dark?"rgba(52,211,153,.15)":"#e2e8f0"}`,
              overflow:"hidden", minHeight:0
            }}>
              <textarea value={rx} onChange={e => setRx(e.target.value)}
                placeholder={"اكتب العلاجات هنا سطر بسطر...\nAmoxicillin 500mg - 1x3"}
                style={{
                  flex:1, padding:"10px 12px", outline:"none", resize:"none",
                  fontSize:13, lineHeight:1.7, fontFamily:"monospace",
                  border:"none", background:"transparent", color:C.txt, minHeight:0
                }} />
              {stampOn && (
                <div style={{
                  borderTop:`1px dashed ${dark?"rgba(52,211,153,.2)":"#e2e8f0"}`,
                  background:"#fff", padding:"8px 12px",
                  display:"flex", justifyContent:"flex-end", alignItems:"center"
                }}>
                  <StampEl l1={settings.stampLine1} l2={settings.stampLine2} shape={settings.stampShape} />
                </div>
              )}
            </div>

            {/* أزرار الإجراءات */}
            <div style={{ display:"flex", flexDirection:"column", gap:6, flexShrink:0 }}>
              {[
                { lbl:"📤 إرسال للصيدلية", fn:sendRx,
                  bg:"linear-gradient(to right,#059669,#34d399)",
                  sh:"0 4px 14px rgba(52,211,153,.3)" },
                { lbl:"🖨️ طباعة وصفة", fn:printRx,
                  bg:"linear-gradient(to right,#0369a1,#38bdf8)",
                  sh:"0 4px 12px rgba(56,189,248,.25)" },
                { lbl:"📄 طباعة تقرير", fn:printReport,
                  bg:"linear-gradient(to right,#374151,#6b7280)",
                  sh:"0 4px 12px rgba(0,0,0,.2)" },
              ].map(b => (
                <button key={b.lbl} onClick={b.fn} style={{
                  width:"100%", padding:"9px 0", borderRadius:10, border:"none", cursor:"pointer",
                  background:b.bg, color:"#fff", fontWeight:700, fontSize:11,
                  display:"flex", alignItems:"center", justifyContent:"center", gap:7,
                  boxShadow:b.sh, transition:"all .2s"
                }}>{b.lbl}</button>
              ))}
            </div>
          </Card>
        </div>

        {/* ===== عمود الفحوصات ===== */}
        <div style={{ display:"flex", flexDirection:"column", gap:10, overflowY:"auto" }}>

          {/* فحوصات */}
          <Card dark={dark} style={{ padding:12 }}>
            <p style={{ fontSize:11, fontWeight:700, color:"#10b981", marginBottom:8 }}>🔬 الفحوصات المختبرية</p>
            {labs.map((item, i) => (
              <CheckRow key={item.id} item={item} dark={dark}
                onToggle={() => setLabs(l => l.map((x,j) => j===i ? {...x,checked:!x.checked} : x))}
                onDelete={() => setLabs(l => l.filter((_,j) => j!==i))} />
            ))}
            <AddRow dark={dark} placeholder="تحليل إضافي..." accentColor="#10b981"
              onAdd={v => setLabs(l => [...l, {id:Date.now(),label:v,checked:false}])} />
          </Card>

          {/* أشعة */}
          <Card dark={dark} style={{ padding:12 }}>
            <p style={{ fontSize:11, fontWeight:700, color:"#10b981", marginBottom:8 }}>☢️ الأشعة والسونار</p>
            {rads.map((item, i) => (
              <CheckRow key={item.id} item={item} dark={dark}
                onToggle={() => setRads(r => r.map((x,j) => j===i ? {...x,checked:!x.checked} : x))}
                onDelete={() => setRads(r => r.filter((_,j) => j!==i))} />
            ))}
            <AddRow dark={dark} placeholder="فحص إضافي..." accentColor="#38bdf8"
              onAdd={v => setRads(r => [...r, {id:Date.now(),label:v,checked:false}])} />
          </Card>
        </div>
      </div>

      {/* ===== مودال الأدوية ===== */}
      {showMeds && (
        <div className="fade-in" style={{
          position:"fixed", inset:0,
          background:"rgba(0,0,0,.82)", backdropFilter:"blur(4px)",
          zIndex:9999, display:"flex", alignItems:"center", justifyContent:"center", padding:10
        }} onClick={() => setShowMeds(false)}>
          <div style={{
            background: dark ? "#0c1a2e" : "#ffffff",
            border:`1px solid ${dark?"rgba(52,211,153,.2)":"#f1f5f9"}`,
            borderRadius:20, width:"96%", maxWidth:860,
            maxHeight:"90vh", display:"flex", flexDirection:"column", overflow:"hidden",
            boxShadow: dark ? "0 24px 64px rgba(0,0,0,.7)" : "0 24px 48px rgba(0,0,0,.12)"
          }} onClick={e => e.stopPropagation()}>

            {/* رأس المودال */}
            <div style={{
              padding:"13px 18px",
              background: dark ? "linear-gradient(135deg,#091528,#0d1f3c)" : "#f8fafc",
              borderBottom:`1px solid ${dark?"rgba(52,211,153,.1)":"#f1f5f9"}`,
              display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0
            }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:13, fontWeight:700, color:"#10b981" }}>💊 قائمة العلاجات الموصى بها</span>
                <span style={{
                  fontSize:9, padding:"2px 10px", borderRadius:10,
                  background:"rgba(16,185,129,.1)", border:"1px solid rgba(16,185,129,.25)", color:"#10b981"
                }}>{meds.length} علاج</span>
              </div>
              <button onClick={() => setShowMeds(false)} style={{
                padding:"5px 12px", borderRadius:8, fontSize:11, cursor:"pointer",
                background: dark?"rgba(255,255,255,.05)":"#f1f5f9",
                border:`1px solid ${C.bor}`, color:C.mut
              }}>إغلاق ✕</button>
            </div>

            {/* شبكة الأدوية */}
            <div style={{ padding:16, overflowY:"auto", flex:1 }}>
              <div style={{
                display:"grid",
                gridTemplateColumns:"repeat(auto-fill,minmax(138px,1fr))",
                gap:12, marginBottom:16
              }}>
                {meds.map((m, i) => (
                  <div key={m.id} style={{
                    background: dark ? "rgba(5,150,105,.07)" : "#f8fafc",
                    border:`1px solid ${dark?"rgba(52,211,153,.12)":"#f1f5f9"}`,
                    borderRadius:14, padding:12, textAlign:"center",
                    cursor:"pointer", transition:"all .25s",
                    boxShadow: dark ? "0 4px 16px rgba(0,0,0,.2)" : "0 2px 8px rgba(0,0,0,.04)"
                  }}>
                    {/* صورة الدواء */}
                    <div onClick={() => pickEmoji(i)} style={{
                      width:68, height:68, margin:"0 auto 8px",
                      borderRadius:12, overflow:"hidden",
                      border:`1px solid ${dark?"rgba(52,211,153,.1)":"#e2e8f0"}`,
                      background: dark ? "rgba(52,211,153,.04)" : "#f0fdf4",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      position:"relative", cursor:"pointer"
                    }}>
                      {m.img
                        ? <img src={m.img} alt={m.name} style={{ width:"100%", height:"100%", objectFit:"contain" }} />
                        : <span style={{ fontSize:34 }}>{m.emoji||"💊"}</span>}
                      <div style={{
                        position:"absolute", inset:0, background:"rgba(0,0,0,.5)",
                        display:"flex", alignItems:"center", justifyContent:"center",
                        color:"#fff", fontSize:10, opacity:0, transition:"opacity .2s"
                      }} className="img-hover">✏️</div>
                    </div>
                    <div style={{ fontSize:9, fontWeight:700, color:C.txt, marginBottom:2, lineHeight:1.3 }}>{m.name}</div>
                    <div style={{ fontSize:8, color:C.mut, marginBottom:9 }}>{m.cat}</div>
                    <div style={{ display:"flex", gap:5, justifyContent:"center" }}>
                      <button onClick={() => { setRx(r => (r&&!r.endsWith("\n")?r+"\n":r)+m.name+"\n"); setShowMeds(false); }}
                        style={{
                          padding:"3px 8px", borderRadius:6, fontSize:8, fontWeight:700, cursor:"pointer",
                          border:"1px solid rgba(16,185,129,.35)",
                          background:"rgba(16,185,129,.1)", color:"#10b981"
                        }}>➕ للروشتة</button>
                      <button onClick={() => setMeds(m2 => m2.filter((_,j) => j!==i))}
                        style={{
                          width:24, height:24, borderRadius:6, cursor:"pointer",
                          border:"1px solid rgba(248,113,113,.25)",
                          background:"rgba(248,113,113,.08)", color:"#f87171",
                          display:"flex", alignItems:"center", justifyContent:"center", fontSize:10
                        }}>🗑️</button>
                    </div>
                  </div>
                ))}
              </div>

              {/* فورم إضافة دواء */}
              <div style={{
                background: dark ? "rgba(16,185,129,.04)" : "#f8fafc",
                border:`1px dashed ${dark?"rgba(52,211,153,.2)":"#e2e8f0"}`,
                borderRadius:14, padding:14
              }}>
                <p style={{ fontSize:11, fontWeight:700, color:"#f59e0b", marginBottom:10 }}>➕ إضافة علاج جديد</p>
                <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
                  {/* رفع صورة */}
                  <div onClick={() => fileRef.current?.click()} style={{
                    width:58, height:58, borderRadius:12, flexShrink:0, cursor:"pointer",
                    border:"1.5px dashed rgba(52,211,153,.4)",
                    background:"rgba(52,211,153,.06)",
                    display:"flex", flexDirection:"column", alignItems:"center",
                    justifyContent:"center", overflow:"hidden", position:"relative", gap:2
                  }}>
                    {newImg
                      ? <img src={newImg} alt="" style={{ width:"100%", height:"100%", objectFit:"contain" }} />
                      : <>
                          <span style={{ fontSize:22 }}>{newEmoji}</span>
                          <span style={{ fontSize:7, color:"#10b981" }}>صورة</span>
                        </>}
                    <input ref={fileRef} type="file" accept="image/*"
                      style={{ display:"none" }} onChange={handleImg} />
                  </div>
                  <button onClick={() => pickEmoji("new")} style={{
                    padding:"6px 10px", borderRadius:8, fontSize:10, fontWeight:700, cursor:"pointer",
                    border:`1px solid ${C.bor}`, background: dark?"rgba(255,255,255,.05)":"#f1f5f9", color:C.mut
                  }}>🎭 رمز</button>
                  <input value={newName} onChange={e => setNewName(e.target.value)}
                    placeholder="اسم العلاج والجرعة..."
                    style={{ flex:1, height:38, padding:"0 12px", borderRadius:10, fontSize:11,
                      border:`1px solid ${dark?"rgba(52,211,153,.2)":"#e2e8f0"}`,
                      background:dark?"rgba(52,211,153,.04)":"#f8fafc",
                      color:C.txt, outline:"none", minWidth:120 }} />
                  <input value={newCat} onChange={e => setNewCat(e.target.value)}
                    placeholder="التصنيف..."
                    style={{ width:120, height:38, padding:"0 12px", borderRadius:10, fontSize:11,
                      border:`1px solid ${dark?"rgba(52,211,153,.2)":"#e2e8f0"}`,
                      background:dark?"rgba(52,211,153,.04)":"#f8fafc",
                      color:C.txt, outline:"none" }} />
                  <button onClick={addMed} style={{
                    height:38, padding:"0 16px", borderRadius:10, border:"none", cursor:"pointer",
                    background:"linear-gradient(135deg,#059669,#34d399)", color:"#fff",
                    fontWeight:700, fontSize:11, flexShrink:0,
                    boxShadow:"0 4px 12px rgba(52,211,153,.3)"
                  }}>💾 حفظ</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ===== مودال الإيموجي ===== */}
      {showEmoji && (
        <div className="fade-in" style={{
          position:"fixed", inset:0, background:"rgba(0,0,0,.75)", zIndex:10000,
          display:"flex", alignItems:"center", justifyContent:"center"
        }} onClick={() => setShowEmoji(false)}>
          <div style={{
            background: dark ? "#131B2E" : "#ffffff",
            border:`1px solid ${C.bor}`,
            borderRadius:16, padding:16, width:300
          }} onClick={e => e.stopPropagation()}>
            <p style={{ fontSize:12, fontWeight:700, color:"#10b981", marginBottom:12 }}>اختر رمز الدواء</p>
            <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
              {EMOJIS.map(e => (
                <button key={e} onClick={() => selectEmoji(e)} style={{
                  width:42, height:42, borderRadius:10, fontSize:22, cursor:"pointer",
                  border:`1px solid ${C.bor}`,
                  background: dark ? "rgba(255,255,255,.05)" : "#f8fafc",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  transition:"all .15s"
                }}>{e}</button>
              ))}
            </div>
            <button onClick={() => setShowEmoji(false)} style={{
              width:"100%", marginTop:12, padding:"7px 0", borderRadius:10, fontSize:11,
              border:`1px solid ${C.bor}`,
              background:dark?"rgba(255,255,255,.05)":"#f1f5f9", color:C.mut, cursor:"pointer"
            }}>إغلاق</button>
          </div>
        </div>
      )}

      {/* ===== توست ===== */}
      {toast && (
        <div className="fade-in" style={{
          position:"fixed", bottom:16, left:16, zIndex:99999,
          padding:"10px 20px", borderRadius:12, fontSize:11, fontWeight:700, color:"#fff",
          background: toast.ok
            ? "linear-gradient(to right,#059669,#34d399)"
            : "linear-gradient(to right,#b91c1c,#f87171)",
          boxShadow:"0 4px 16px rgba(0,0,0,.3)"
        }}>{toast.msg}</div>
      )}

      {/* إغلاق الدروب داونز عند الضغط خارجها */}
      {(showSett || showMeds || showEmoji) && (
        <div style={{ position:"fixed", inset:0, zIndex:showMeds||showEmoji?9998:49 }}
          onClick={() => { setShowSett(false); }} />
      )}
    </div>
  );
}

// ===== تشغيل التطبيق =====
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<DoctorApp />);
</script>
</body>
</html>
