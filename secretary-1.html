<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#059669">
<title>منظومة دوائي - لوحة السكرتارية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { font-family: 'Cairo', sans-serif; }
html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: rgba(52,211,153,.3); border-radius: 4px; }
@media (orientation: portrait) { #rw { display: flex !important; } #root { display: none !important; } }
@media (orientation: landscape) { #rw { display: none !important; } }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn .2s ease forwards; }
@keyframes pulse-dot { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(.8); } }
.pulse { animation: pulse-dot 1.5s ease-in-out infinite; }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
.slide-in { animation: slideIn .3s ease forwards; }
@keyframes spin { to { transform:rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }
</style>
</head>
<body>

<div id="rw" style="display:none;position:fixed;inset:0;background:#020a06;z-index:9999999;
  flex-direction:column;align-items:center;justify-content:center;gap:18px;
  color:#fff;text-align:center;padding:30px;">
  <i class="fa-solid fa-rotate" style="font-size:60px;color:#34d399;"></i>
  <h2 style="font-size:22px;font-weight:900;color:#34d399;">يرجى تدوير الجهاز أفقياً</h2>
  <p style="font-size:13px;color:#6b7280;">لوحة السكرتارية تعمل بالوضع الأفقي فقط</p>
</div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ===== مفتاح LocalStorage المشترك مع واجهة الطبيب =====
const QUEUE_KEY   = "dwaee_queue";
const THEME_KEY   = "dwaee_sec_th";
const NOTIF_KEY   = "dwaee_notifications";

// ===== أنواع الزيارات =====
const VISIT_TYPES = {
  new:     { label:"معاينة جديدة",     price:25000, icon:"fa-user-plus",     color:"#34d399" },
  consult: { label:"استشارة / مراجعة", price:0,     icon:"fa-comments",      color:"#38bdf8" },
  urgent:  { label:"فحص مستعجل",       price:35000, icon:"fa-triangle-exclamation", color:"#f87171" },
};

// ===== بطاقة إحصائية =====
function StatCard({ icon, label, value, color, dark, pulse: doPulse }) {
  return (
    <div style={{
      background: dark ? "#131B2E" : "#ffffff",
      border: `1px solid ${dark ? "#1E293B" : "#f1f5f9"}`,
      borderRadius: 14, padding: "12px 16px",
      display: "flex", alignItems: "center", gap: 12,
      boxShadow: dark ? "0 4px 16px rgba(0,0,0,.3)" : "0 2px 8px rgba(0,0,0,.06)",
      flex: 1, minWidth: 0, position: "relative", overflow: "hidden"
    }}>
      {dark && <div style={{ position:"absolute", top:0, left:0, right:0, height:1,
        background:`linear-gradient(90deg,transparent,${color}33,transparent)` }} />}
      <div style={{
        width: 42, height: 42, borderRadius: 12, flexShrink: 0,
        background: `${color}18`, border: `1px solid ${color}33`,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: 18, color: color,
        ...(doPulse ? { animation: "pulse-dot 1.5s ease-in-out infinite" } : {})
      }}>
        <i className={`fa-solid ${icon}`} />
      </div>
      <div style={{ minWidth: 0 }}>
        <div style={{ fontSize: 22, fontWeight: 900, color, lineHeight: 1,
          ...(dark ? { textShadow: `0 0 10px ${color}55` } : {}) }}>{value}</div>
        <div style={{ fontSize: 10, color: dark ? "#6b7280" : "#94a3b8", marginTop: 2 }}>{label}</div>
      </div>
    </div>
  );
}

// ===== بطاقة عامة =====
function Card({ children, dark, style={} }) {
  return (
    <div style={{
      background: dark ? "#131B2E" : "#ffffff",
      border: `1px solid ${dark ? "#1E293B" : "#f1f5f9"}`,
      borderRadius: 16, position: "relative", overflow: "hidden",
      boxShadow: dark ? "0 8px 32px rgba(0,0,0,.4),0 1px 0 rgba(52,211,153,.06) inset"
                      : "0 4px 16px rgba(0,0,0,.06)",
      ...style
    }}>
      {dark && <div style={{ position:"absolute", top:0, left:0, right:0, height:1,
        background:"linear-gradient(90deg,transparent,rgba(52,211,153,.2),transparent)" }} />}
      {children}
    </div>
  );
}

// ===== شارة الحالة =====
function StatusBadge({ status }) {
  const map = {
    waiting: { label:"انتظار",   bg:"rgba(251,191,36,.12)", color:"#fbbf24", border:"rgba(251,191,36,.3)" },
    inside:  { label:"عند الطبيب", bg:"rgba(56,189,248,.12)", color:"#38bdf8", border:"rgba(56,189,248,.3)" },
    done:    { label:"مكتمل",    bg:"rgba(52,211,153,.12)", color:"#34d399", border:"rgba(52,211,153,.3)" },
  };
  const s = map[status] || map.waiting;
  return (
    <span style={{
      padding: "3px 10px", borderRadius: 20, fontSize: 10, fontWeight: 700,
      background: s.bg, color: s.color, border: `1px solid ${s.border}`,
      whiteSpace: "nowrap"
    }}>{s.label}</span>
  );
}

// ===== التطبيق الرئيسي =====
function SecretaryApp() {
  const [dark, setDark]       = useState(() => localStorage.getItem(THEME_KEY) !== "light");
  const [queue, setQueue]     = useState(() => JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]"));
  const [name, setName]       = useState("");
  const [age, setAge]         = useState("");
  const [phone, setPhone]     = useState("");
  const [gender, setGender]   = useState("ذكر");
  const [visitType, setVisit] = useState("new");
  const [search, setSearch]   = useState("");
  const [notifs, setNotifs]   = useState([]);
  const [showNotif, setShowNotif] = useState(false);
  const [toast, setToast]     = useState(null);
  const [nextOrder, setNextOrder] = useState(() => {
    const q = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
    return q.length > 0 ? Math.max(...q.map(p => p.order || 0)) + 1 : 1;
  });
  const audioRef = useRef(null);

  // ثيم
  useEffect(() => { localStorage.setItem(THEME_KEY, dark ? "dark" : "light"); }, [dark]);

  // مزامنة مع واجهة الطبيب كل ثانية
  useEffect(() => {
    const sync = () => {
      const stored = JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]");
      setQueue(stored);
    };
    const interval = setInterval(sync, 1000);
    window.addEventListener("storage", sync);
    return () => { clearInterval(interval); window.removeEventListener("storage", sync); };
  }, []);

  // استقبال الإشعارات
  useEffect(() => {
    const checkNotifs = () => {
      const stored = JSON.parse(localStorage.getItem(NOTIF_KEY) || "[]");
      if (stored.length > 0) {
        setNotifs(prev => [...stored, ...prev].slice(0, 20));
        localStorage.setItem(NOTIF_KEY, "[]");
        playBeep();
      }
    };
    const interval = setInterval(checkNotifs, 1500);
    return () => clearInterval(interval);
  }, []);

  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  }

  function showToast(msg, ok=false) {
    setToast({ msg, ok });
    setTimeout(() => setToast(null), 3000);
  }

  // إضافة مريض
  function addPatient() {
    if (!name.trim()) { showToast("🚨 يرجى إدخال اسم المريض!"); return; }
    if (!age || isNaN(parseInt(age))) { showToast("🚨 يرجى إدخال عمر صحيح!"); return; }
    const ageNum = parseInt(age);

    // منع التكرار
    const dup = queue.some(p =>
      p.name.split(" ").slice(0,2).join(" ") === name.trim().split(" ").slice(0,2).join(" ")
    );
    if (dup && !window.confirm(`⚠️ يوجد مريض باسم مشابه "${name.trim()}". إضافة رغم ذلك؟`)) return;

    const vt = VISIT_TYPES[visitType];
    const newP = {
      id: Date.now().toString(),
      name: name.trim(),
      age: ageNum,
      gender,
      phone: phone.trim(),
      visitType,
      visitLabel: vt.label,
      price: vt.price,
      status: "waiting",
      isPaid: vt.price === 0,
      order: nextOrder,
      createdAt: new Date().toLocaleTimeString("ar-IQ", { hour:"2-digit", minute:"2-digit" }),
      timestamp: Date.now(),
    };

    const updated = [...queue, newP];
    setQueue(updated);
    localStorage.setItem(QUEUE_KEY, JSON.stringify(updated));
    setNextOrder(n => n + 1);
    setName(""); setAge(""); setPhone(""); setGender("ذكر"); setVisit("new");
    showToast(`✅ تم إضافة ${newP.name} — رقم ${newP.order}`, true);
    playBeep();
  }

  // تغيير الحالة
  function cycleStatus(id) {
    const updated = queue.map(p => {
      if (p.id !== id) return p;
      const next = p.status === "waiting" ? "inside" : p.status === "inside" ? "done" : "waiting";
      return { ...p, status: next };
    });
    setQueue(updated);
    localStorage.setItem(QUEUE_KEY, JSON.stringify(updated));
  }

  // تبديل الدفع
  function togglePay(id) {
    const updated = queue.map(p => p.id === id ? { ...p, isPaid: !p.isPaid } : p);
    setQueue(updated);
    localStorage.setItem(QUEUE_KEY, JSON.stringify(updated));
  }

  // حذف مريض
  function deletePatient(id) {
    if (!window.confirm("هل تريد إزالة هذا المريض من الطابور؟")) return;
    const updated = queue.filter(p => p.id !== id);
    setQueue(updated);
    localStorage.setItem(QUEUE_KEY, JSON.stringify(updated));
    showToast("تم الإزالة");
  }

  // تحريك في الطابور
  function moveUp(idx) {
    if (idx <= 0) return;
    const arr = [...queue];
    [arr[idx], arr[idx-1]] = [arr[idx-1], arr[idx]];
    arr.forEach((p,i) => p.order = i + 1);
    setQueue(arr);
    localStorage.setItem(QUEUE_KEY, JSON.stringify(arr));
  }

  function moveDown(idx) {
    if (idx >= queue.length - 1) return;
    const arr = [...queue];
    [arr[idx], arr[idx+1]] = [arr[idx+1], arr[idx]];
    arr.forEach((p,i) => p.order = i + 1);
    setQueue(arr);
    localStorage.setItem(QUEUE_KEY, JSON.stringify(arr));
  }

  // تصفير اليوم
  function newDay() {
    if (!window.confirm("هل تريد مسح طابور اليوم وبدء يوم جديد؟")) return;
    setQueue([]); setNextOrder(1);
    localStorage.setItem(QUEUE_KEY, "[]");
    showToast("✅ تم تصفير الطابور ليوم جديد", true);
  }

  // إحصاءات
  const waiting  = queue.filter(p => p.status === "waiting").length;
  const inside   = queue.filter(p => p.status === "inside").length;
  const done     = queue.filter(p => p.status === "done").length;
  const revenue  = queue.filter(p => p.isPaid).reduce((s,p) => s + p.price, 0);

  // فلترة البحث
  const filtered = search.trim()
    ? queue.filter(p => p.name.includes(search) || (p.phone||"").includes(search))
    : queue;

  // تاغ العمر
  function ageTag(age) {
    if (age <= 12) return { label:"طفل 👶", color:"#38bdf8" };
    if (age >= 60) return { label:"كبار سن 👴", color:"#fbbf24" };
    return null;
  }

  const C = {
    bg:   dark ? "#0B1221" : "#F8FAFC",
    txt:  dark ? "#f0fdf4" : "#1e293b",
    mut:  dark ? "#6b7280" : "#94a3b8",
    bor:  dark ? "#1E293B" : "#f1f5f9",
    inp:  { background: dark?"rgba(52,211,153,.05)":"#f8fafc",
            borderColor: dark?"rgba(52,211,153,.2)":"#e2e8f0",
            color: dark?"#f0fdf4":"#1e293b" },
  };

  return (
    <div style={{ background:C.bg, color:C.txt, width:"100vw", height:"100vh",
      display:"flex", flexDirection:"column", overflow:"hidden", transition:"all .3s" }}>

      {/* ===== هيدر ===== */}
      <header style={{
        background: dark ? "linear-gradient(135deg,#0d1729,#091528)" : "#ffffff",
        borderBottom: `1px solid ${C.bor}`,
        height: 56, flexShrink: 0,
        display: "flex", alignItems: "center",
        justifyContent: "space-between",
        padding: "0 14px", gap: 10, zIndex: 50,
        boxShadow: dark ? "0 2px 20px rgba(0,0,0,.4)" : "0 1px 8px rgba(0,0,0,.06)",
        position: "relative"
      }}>
        {dark && <div style={{ position:"absolute", bottom:0, left:0, right:0, height:1,
          background:"linear-gradient(90deg,transparent,rgba(52,211,153,.3),transparent)" }} />}

        {/* لوغو */}
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{
            width:38, height:38, borderRadius:11,
            background:"linear-gradient(135deg,#059669,#34d399)",
            display:"flex", alignItems:"center", justifyContent:"center",
            fontSize:18, boxShadow:"0 4px 14px rgba(52,211,153,.4)"
          }}>🏥</div>
          <div>
            <div style={{ fontSize:13, fontWeight:700 }}>منظومة دوائي — السكرتارية</div>
            <div style={{ fontSize:9, color:C.mut }}>لوحة الاستقبال والحجز اليومي</div>
          </div>
        </div>

        {/* أدوات */}
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>

          {/* بحث */}
          <div style={{ position:"relative" }}>
            <i className="fa-solid fa-magnifying-glass" style={{
              position:"absolute", right:10, top:"50%", transform:"translateY(-50%)",
              color:C.mut, fontSize:12
            }} />
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="بحث باسم أو هاتف..."
              style={{ ...C.inp, height:34, padding:"0 32px 0 12px", borderRadius:10,
                border:`1px solid ${C.bor}`, fontSize:11, outline:"none", width:180 }} />
          </div>

          {/* الإشعارات */}
          <div style={{ position:"relative" }}>
            <button onClick={() => setShowNotif(s => !s)} style={{
              width:36, height:36, borderRadius:10, cursor:"pointer",
              background: dark?"rgba(255,255,255,.05)":"#f1f5f9",
              border:`1px solid ${C.bor}`, color:C.mut,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:15, position:"relative"
            }}>
              <i className="fa-solid fa-bell" />
              {notifs.length > 0 && (
                <span style={{
                  position:"absolute", top:-4, left:-4,
                  width:16, height:16, borderRadius:"50%",
                  background:"#f87171", color:"#fff",
                  fontSize:9, fontWeight:700,
                  display:"flex", alignItems:"center", justifyContent:"center"
                }}>{notifs.length > 9 ? "9+" : notifs.length}</span>
              )}
            </button>
            {showNotif && (
              <div className="fade-in" style={{
                position:"absolute", top:42, left:0, width:280, maxHeight:320,
                background: dark?"#131B2E":"#ffffff",
                border:`1px solid ${C.bor}`, borderRadius:14,
                boxShadow: dark?"0 16px 48px rgba(0,0,0,.6)":"0 8px 32px rgba(0,0,0,.12)",
                zIndex:600, overflow:"hidden", display:"flex", flexDirection:"column"
              }} onClick={e => e.stopPropagation()}>
                <div style={{ padding:"10px 14px", borderBottom:`1px solid ${C.bor}`,
                  display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ fontSize:12, fontWeight:700, color:"#34d399" }}>
                    <i className="fa-solid fa-bell" /> الإشعارات
                  </span>
                  {notifs.length > 0 && (
                    <button onClick={() => setNotifs([])} style={{
                      fontSize:9, color:C.mut, background:"none", border:"none", cursor:"pointer"
                    }}>مسح الكل</button>
                  )}
                </div>
                <div style={{ overflowY:"auto", maxHeight:260 }}>
                  {notifs.length === 0
                    ? <div style={{ padding:20, textAlign:"center", color:C.mut, fontSize:11 }}>
                        لا توجد إشعارات
                      </div>
                    : notifs.map((n,i) => (
                      <div key={i} style={{
                        padding:"10px 14px", borderBottom:`1px solid ${C.bor}`,
                        fontSize:11, display:"flex", gap:8, alignItems:"flex-start"
                      }}>
                        <span style={{ fontSize:16 }}>{n.icon||"🔔"}</span>
                        <div>
                          <div style={{ fontWeight:700 }}>{n.title}</div>
                          <div style={{ color:C.mut, fontSize:10, marginTop:2 }}>{n.body}</div>
                          <div style={{ color:C.mut, fontSize:9, marginTop:2 }}>{n.time}</div>
                        </div>
                      </div>
                    ))}
                </div>
              </div>
            )}
          </div>

          {/* مفتاح الثيم */}
          <div style={{ display:"flex", alignItems:"center", gap:6, padding:"5px 10px",
            borderRadius:12, border:`1px solid ${C.bor}`,
            background:dark?"rgba(255,255,255,.04)":"#f8fafc" }}>
            <span style={{ fontSize:13 }}>{dark?"🌙":"☀️"}</span>
            <div onClick={() => setDark(d => !d)} style={{
              position:"relative", width:42, height:22, borderRadius:20, cursor:"pointer",
              background:dark?"#059669":"#cbd5e1", transition:"all .3s"
            }}>
              <div style={{
                position:"absolute", top:3, left:dark?22:2,
                width:16, height:16, borderRadius:"50%",
                background:"#fff", transition:"all .3s",
                boxShadow:"0 2px 6px rgba(0,0,0,.2)"
              }} />
            </div>
            <span style={{ fontSize:13 }}>{dark?"☀️":"🌙"}</span>
          </div>
        </div>
      </header>

      {/* ===== شريط الإحصاءات ===== */}
      <div style={{ padding:"8px 14px", flexShrink:0,
        display:"flex", gap:8,
        background:dark?"rgba(11,18,33,.8)":"rgba(248,250,252,.9)",
        borderBottom:`1px solid ${C.bor}` }}>
        <StatCard icon="fa-hourglass-half" label="في الانتظار"  value={waiting} color="#fbbf24" dark={dark} pulse={waiting>0} />
        <StatCard icon="fa-stethoscope"    label="عند الطبيب"   value={inside}  color="#38bdf8" dark={dark} />
        <StatCard icon="fa-circle-check"   label="تم الفحص"     value={done}    color="#34d399" dark={dark} />
        <StatCard icon="fa-wallet"         label="الإيرادات د.ع" value={revenue.toLocaleString()} color="#a78bfa" dark={dark} />
      </div>

      {/* ===== الجسم ===== */}
      <div style={{ display:"grid", gridTemplateColumns:"300px 1fr",
        gap:10, padding:10, flex:1, overflow:"hidden" }}>

        {/* ===== العمود الأيمن: فورم الإدخال ===== */}
        <Card dark={dark} style={{ display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <div style={{ padding:"12px 14px", borderBottom:`1px solid ${C.bor}`,
            fontSize:12, fontWeight:700, color:"#34d399",
            display:"flex", alignItems:"center", gap:7 }}>
            <i className="fa-solid fa-user-plus" />
            تسجيل مريض جديد
          </div>
          <div style={{ padding:14, overflow:"auto", flex:1, display:"flex", flexDirection:"column", gap:10 }}>

            {/* الاسم */}
            <div>
              <label style={{ fontSize:10, fontWeight:700, color:C.mut, display:"block", marginBottom:4 }}>
                الاسم الثلاثي الكامل
              </label>
              <input value={name} onChange={e => setName(e.target.value)}
                placeholder="اكتب اسم المريض..."
                onKeyDown={e => e.key === "Enter" && document.getElementById("ageInput")?.focus()}
                style={{ ...C.inp, width:"100%", height:38, padding:"0 12px",
                  borderRadius:9, border:`1px solid ${C.bor}`, fontSize:12, outline:"none" }} />
            </div>

            {/* العمر */}
            <div>
              <label style={{ fontSize:10, fontWeight:700, color:C.mut, display:"block", marginBottom:4 }}>العمر</label>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                <input id="ageInput" type="number" value={age}
                  onChange={e => setAge(e.target.value)} placeholder="مثال: 35"
                  min="0" max="120"
                  style={{ ...C.inp, flex:1, height:38, padding:"0 12px",
                    borderRadius:9, border:`1px solid ${C.bor}`, fontSize:12, outline:"none" }} />
                {age && !isNaN(parseInt(age)) && ageTag(parseInt(age)) && (
                  <span style={{
                    padding:"4px 10px", borderRadius:20, fontSize:9, fontWeight:700,
                    background:`${ageTag(parseInt(age)).color}18`,
                    border:`1px solid ${ageTag(parseInt(age)).color}44`,
                    color: ageTag(parseInt(age)).color, whiteSpace:"nowrap"
                  }}>{ageTag(parseInt(age)).label}</span>
                )}
              </div>
            </div>

            {/* الجنس */}
            <div>
              <label style={{ fontSize:10, fontWeight:700, color:C.mut, display:"block", marginBottom:4 }}>الجنس</label>
              <div style={{ display:"flex", gap:0, borderRadius:9, overflow:"hidden",
                border:`1px solid ${C.bor}`, background:dark?"rgba(52,211,153,.03)":"#f8fafc" }}>
                {["ذكر","أنثى"].map(g => (
                  <button key={g} onClick={() => setGender(g)} style={{
                    flex:1, padding:"8px 0", border:"none", cursor:"pointer",
                    fontSize:12, fontWeight:700, transition:"all .2s",
                    background: gender===g ? "rgba(52,211,153,.2)" : "transparent",
                    color: gender===g ? "#34d399" : C.mut,
                    borderRight: g==="ذكر" ? `1px solid ${C.bor}` : "none"
                  }}>{g==="ذكر"?"👨 ذكر":"👩 أنثى"}</button>
                ))}
              </div>
            </div>

            {/* الهاتف */}
            <div>
              <label style={{ fontSize:10, fontWeight:700, color:C.mut, display:"block", marginBottom:4 }}>
                رقم الهاتف <span style={{ opacity:.6 }}>(اختياري)</span>
              </label>
              <input type="tel" value={phone} onChange={e => setPhone(e.target.value)}
                placeholder="07XX XXX XXXX"
                style={{ ...C.inp, width:"100%", height:38, padding:"0 12px",
                  borderRadius:9, border:`1px solid ${C.bor}`, fontSize:12, outline:"none" }} />
            </div>

            {/* نوع الزيارة */}
            <div>
              <label style={{ fontSize:10, fontWeight:700, color:C.mut, display:"block", marginBottom:6 }}>نوع الزيارة</label>
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {Object.entries(VISIT_TYPES).map(([k,v]) => (
                  <button key={k} onClick={() => setVisit(k)} style={{
                    padding:"8px 12px", borderRadius:9, border:"none", cursor:"pointer",
                    display:"flex", alignItems:"center", justifyContent:"space-between",
                    transition:"all .2s",
                    border: `1px solid ${visitType===k ? v.color+"66" : C.bor}`,
                    background: visitType===k ? `${v.color}12` : dark?"rgba(255,255,255,.03)":"#f8fafc",
                  }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <i className={`fa-solid ${v.icon}`} style={{ color:visitType===k?v.color:C.mut, fontSize:13 }} />
                      <span style={{ fontSize:11, fontWeight:600, color:visitType===k?v.color:C.txt }}>{v.label}</span>
                    </div>
                    <span style={{ fontSize:10, fontWeight:700,
                      color:v.price===0?"#34d399":"#fbbf24" }}>
                      {v.price===0?"مجاني":`${(v.price/1000).toFixed(0)}k د.ع`}
                    </span>
                  </button>
                ))}
              </div>
            </div>

            {/* زر الإضافة */}
            <button onClick={addPatient} style={{
              width:"100%", padding:"11px 0", borderRadius:11, border:"none", cursor:"pointer",
              background:"linear-gradient(to right,#059669,#34d399)",
              color:"#fff", fontWeight:700, fontSize:13,
              display:"flex", alignItems:"center", justifyContent:"center", gap:8,
              boxShadow:"0 4px 14px rgba(52,211,153,.35)",
              transition:"all .2s", marginTop:4
            }}>
              <i className="fa-solid fa-plus-circle" />
              إضافة للطابور
            </button>

            {/* زر يوم جديد */}
            <button onClick={newDay} style={{
              width:"100%", padding:"8px 0", borderRadius:9, cursor:"pointer",
              background:"rgba(248,113,113,.1)", border:"1px solid rgba(248,113,113,.3)",
              color:"#f87171", fontWeight:700, fontSize:11,
              display:"flex", alignItems:"center", justifyContent:"center", gap:6
            }}>
              <i className="fa-solid fa-rotate" />
              تصفير الطابور — يوم جديد
            </button>

          </div>
        </Card>

        {/* ===== العمود الأيسر: جدول الطابور ===== */}
        <Card dark={dark} style={{ display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <div style={{ padding:"12px 14px", borderBottom:`1px solid ${C.bor}`,
            display:"flex", justifyContent:"space-between", alignItems:"center", flexShrink:0 }}>
            <div style={{ fontSize:12, fontWeight:700, color:"#34d399",
              display:"flex", alignItems:"center", gap:7 }}>
              <i className="fa-solid fa-list-ol" />
              طابور الحجز اليومي
              <span style={{ fontSize:9, padding:"2px 10px", borderRadius:20,
                background:"rgba(52,211,153,.1)", border:"1px solid rgba(52,211,153,.25)",
                color:"#34d399" }}>{queue.length} مريض</span>
            </div>
            {/* مؤشر المزامنة */}
            <div style={{ display:"flex", alignItems:"center", gap:5,
              fontSize:10, color:"#34d399" }}>
              <div style={{ width:7, height:7, borderRadius:"50%", background:"#34d399",
                animation:"pulse-dot 1.5s ease-in-out infinite" }} />
              مزامنة لحظية
            </div>
          </div>

          {/* رأس الجدول */}
          <div style={{ padding:"8px 14px", flexShrink:0,
            background:dark?"rgba(11,18,33,.6)":"#f8fafc",
            borderBottom:`1px solid ${C.bor}`,
            display:"grid",
            gridTemplateColumns:"36px 1fr 80px 90px 80px 80px 90px 80px",
            gap:8, fontSize:10, fontWeight:700, color:C.mut }}>
            <span>#</span>
            <span>المريض</span>
            <span style={{ textAlign:"center" }}>العمر</span>
            <span style={{ textAlign:"center" }}>الزيارة</span>
            <span style={{ textAlign:"center" }}>الوقت</span>
            <span style={{ textAlign:"center" }}>الدفع</span>
            <span style={{ textAlign:"center" }}>الحالة</span>
            <span style={{ textAlign:"center" }}>إجراء</span>
          </div>

          {/* صفوف المرضى */}
          <div style={{ flex:1, overflowY:"auto" }}>
            {filtered.length === 0 ? (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center",
                justifyContent:"center", height:"100%", gap:10, color:C.mut }}>
                <i className="fa-solid fa-user-clock" style={{ fontSize:36, opacity:.3 }} />
                <p style={{ fontSize:12 }}>
                  {search ? "لا توجد نتائج للبحث" : "لا يوجد مرضى في الطابور بعد"}
                </p>
              </div>
            ) : filtered.map((p, idx) => {
              const tag = ageTag(p.age);
              const vt = VISIT_TYPES[p.visitType] || VISIT_TYPES.new;
              return (
                <div key={p.id} className="fade-in" style={{
                  padding:"10px 14px",
                  display:"grid",
                  gridTemplateColumns:"36px 1fr 80px 90px 80px 80px 90px 80px",
                  gap:8, alignItems:"center",
                  borderBottom:`1px solid ${C.bor}`,
                  background: p.status==="done"
                    ? dark?"rgba(52,211,153,.04)":"rgba(52,211,153,.03)"
                    : p.status==="inside"
                    ? dark?"rgba(56,189,248,.04)":"rgba(56,189,248,.03)"
                    : "transparent",
                  transition:"all .2s"
                }}>
                  {/* رقم */}
                  <span style={{
                    width:28, height:28, borderRadius:8,
                    background:"rgba(52,211,153,.12)", border:"1px solid rgba(52,211,153,.2)",
                    color:"#34d399", fontSize:11, fontWeight:700,
                    display:"flex", alignItems:"center", justifyContent:"center"
                  }}>{p.order}</span>

                  {/* الاسم */}
                  <div>
                    <div style={{ fontSize:12, fontWeight:700 }}>{p.name}</div>
                    <div style={{ display:"flex", gap:4, alignItems:"center", marginTop:2 }}>
                      <span style={{ fontSize:9, color:C.mut }}>{p.gender}</span>
                      {tag && <span style={{ fontSize:8, padding:"1px 6px", borderRadius:10,
                        background:`${tag.color}18`, color:tag.color, border:`1px solid ${tag.color}33`
                      }}>{tag.label}</span>}
                      {p.phone && <span style={{ fontSize:9, color:C.mut }}>
                        <i className="fa-solid fa-phone" style={{ fontSize:8 }} /> {p.phone}
                      </span>}
                    </div>
                  </div>

                  {/* العمر */}
                  <span style={{ textAlign:"center", fontSize:11, color:C.mut }}>{p.age} سنة</span>

                  {/* الزيارة */}
                  <span style={{ textAlign:"center", fontSize:10, fontWeight:700, color:vt.color }}>
                    <i className={`fa-solid ${vt.icon}`} style={{ marginLeft:4 }} />
                    {vt.label}
                  </span>

                  {/* الوقت */}
                  <span style={{ textAlign:"center", fontSize:10, color:C.mut }}>{p.createdAt}</span>

                  {/* الدفع */}
                  <button onClick={() => togglePay(p.id)} style={{
                    padding:"3px 8px", borderRadius:8, border:"none", cursor:"pointer",
                    fontSize:9, fontWeight:700,
                    background: p.isPaid ? "rgba(52,211,153,.15)" : "rgba(251,191,36,.12)",
                    border: `1px solid ${p.isPaid?"rgba(52,211,153,.3)":"rgba(251,191,36,.3)"}`,
                    color: p.isPaid ? "#34d399" : "#fbbf24"
                  }}>{p.isPaid ? "✅ مدفوع" : p.price===0 ? "مجاني" : "💰 دفع"}</button>

                  {/* الحالة */}
                  <div onClick={() => cycleStatus(p.id)} style={{ cursor:"pointer", textAlign:"center" }}>
                    <StatusBadge status={p.status} />
                  </div>

                  {/* إجراءات */}
                  <div style={{ display:"flex", gap:3, justifyContent:"center" }}>
                    <button onClick={() => moveUp(queue.indexOf(p))} style={{
                      width:24, height:24, borderRadius:6, border:`1px solid ${C.bor}`,
                      background:"transparent", color:C.mut, cursor:"pointer", fontSize:10
                    }}>▲</button>
                    <button onClick={() => moveDown(queue.indexOf(p))} style={{
                      width:24, height:24, borderRadius:6, border:`1px solid ${C.bor}`,
                      background:"transparent", color:C.mut, cursor:"pointer", fontSize:10
                    }}>▼</button>
                    <button onClick={() => deletePatient(p.id)} style={{
                      width:24, height:24, borderRadius:6,
                      border:"1px solid rgba(248,113,113,.3)",
                      background:"rgba(248,113,113,.08)", color:"#f87171",
                      cursor:"pointer", fontSize:10
                    }}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>

          {/* شريط الصندوق المالي */}
          <div style={{
            padding:"8px 14px", flexShrink:0,
            borderTop:`1px solid ${C.bor}`,
            background:dark?"rgba(11,18,33,.6)":"#f8fafc",
            display:"flex", gap:10, alignItems:"center",
            flexWrap:"wrap"
          }}>
            <span style={{ fontSize:11, fontWeight:700, color:C.mut }}>
              <i className="fa-solid fa-wallet" style={{ color:"#a78bfa", marginLeft:5 }} />
              الصندوق اليومي:
            </span>
            {[
              { label:"الإيرادات", value:`${revenue.toLocaleString()} د.ع`, color:"#34d399" },
              { label:"مدفوعة", value:queue.filter(p=>p.isPaid&&p.price>0).length, color:"#38bdf8" },
              { label:"مجانية", value:queue.filter(p=>p.price===0).length, color:"#fbbf24" },
              { label:"إجمالي", value:queue.length, color:"#a78bfa" },
            ].map(s => (
              <div key={s.label} style={{
                padding:"4px 12px", borderRadius:8,
                background:`${s.color}10`, border:`1px solid ${s.color}33`,
                display:"flex", flexDirection:"column", alignItems:"center"
              }}>
                <span style={{ fontSize:9, color:C.mut }}>{s.label}</span>
                <span style={{ fontSize:13, fontWeight:700, color:s.color }}>{s.value}</span>
              </div>
            ))}
          </div>
        </Card>
      </div>

      {/* ===== توست ===== */}
      {toast && (
        <div className="slide-in" style={{
          position:"fixed", bottom:16, left:16, zIndex:99999,
          padding:"10px 20px", borderRadius:12, fontSize:11, fontWeight:700, color:"#fff",
          background:toast.ok
            ? "linear-gradient(to right,#059669,#34d399)"
            : "linear-gradient(to right,#b91c1c,#f87171)",
          boxShadow:"0 4px 16px rgba(0,0,0,.3)"
        }}>{toast.msg}</div>
      )}

      {/* إغلاق الإشعارات */}
      {showNotif && (
        <div style={{ position:"fixed", inset:0, zIndex:49 }}
          onClick={() => setShowNotif(false)} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SecretaryApp />);
</script>
</body>
</html>
